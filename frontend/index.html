<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupportDesk CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --bg2:       #111118;
      --bg3:       #18181f;
      --border:    #2a2a35;
      --border2:   #3a3a48;
      --text:      #e8e8f0;
      --muted:     #7a7a90;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --accent3:   #43d9ad;
      --warn:      #ffb347;
      --open:      #43d9ad;
      --inprog:    #ffb347;
      --closed:    #7a7a90;
      --high:      #ff6584;
      --med:       #ffb347;
      --low:       #43d9ad;
      --radius:    12px;
      --radius-lg: 20px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--accent); }

    .sidebar-nav {
      padding: 16px 12px;
      flex: 1;
    }

    .nav-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 8px 8px 4px;
      margin-top: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,.15); color: var(--accent); }
    .nav-item.active .nav-icon { color: var(--accent); }

    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .new-ticket-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px 16px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }

    .new-ticket-btn:hover {
      background: #7b74ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(108,99,255,.4);
    }

    /* ── Main ──────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Topbar ────────────────────────────────────────────────────────── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex: 0 0 auto;
    }

    .search-wrap {
      flex: 1;
      max-width: 460px;
      margin-left: auto;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13.5px;
      outline: none;
      transition: border-color .2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Page ──────────────────────────────────────────────────────────── */
    .page { display: none; padding: 28px; }
    .page.active { display: block; }

    /* ── Stats ─────────────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .stat-card.total::before   { background: var(--accent); }
    .stat-card.s-open::before  { background: var(--open); }
    .stat-card.s-inprog::before { background: var(--inprog); }
    .stat-card.s-closed::before { background: var(--muted); }

    .stat-card:hover { border-color: var(--border2); }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stat-card.total   .stat-value { color: var(--accent); }
    .stat-card.s-open  .stat-value { color: var(--open); }
    .stat-card.s-inprog .stat-value { color: var(--inprog); }
    .stat-card.s-closed .stat-value { color: var(--muted); }

    /* ── Filter Bar ────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .filter-chip:hover { border-color: var(--border2); color: var(--text); }

    .filter-chip.active {
      background: rgba(108,99,255,.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-chip.open.active   { background: rgba(67,217,173,.1); border-color: var(--open); color: var(--open); }
    .filter-chip.inprog.active { background: rgba(255,179,71,.1); border-color: var(--inprog); color: var(--inprog); }
    .filter-chip.closed.active { background: rgba(122,122,144,.1); border-color: var(--muted); color: var(--muted); }

    .filter-right { margin-left: auto; display: flex; gap: 8px; }

    .select-filter {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-family: var(--font-body);
      font-size: 12.5px;
      cursor: pointer;
      outline: none;
    }

    /* ── Tickets Table ─────────────────────────────────────────────────── */
    .tickets-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .tickets-table {
      width: 100%;
      border-collapse: collapse;
    }

    .tickets-table th {
      padding: 13px 16px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .tickets-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .tickets-table tr:last-child td { border-bottom: none; }

    .tickets-table tbody tr {
      cursor: pointer;
      transition: background .12s;
    }

    .tickets-table tbody tr:hover { background: var(--bg3); }

    .ticket-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    .ticket-subject {
      font-weight: 500;
      color: var(--text);
      max-width: 260px;
    }

    .ticket-subject .sub { 
      font-size: 11.5px; 
      color: var(--muted); 
      font-weight: 400;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }

    .customer-info .name { font-weight: 500; }
    .customer-info .email { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* Status & Priority Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-open   { background: rgba(67,217,173,.1); color: var(--open); }
    .badge-inprog { background: rgba(255,179,71,.1);  color: var(--inprog); }
    .badge-closed { background: rgba(122,122,144,.15); color: var(--muted); }
    .badge-high   { background: rgba(255,101,132,.1); color: var(--high); }
    .badge-med    { background: rgba(255,179,71,.1);  color: var(--med); }
    .badge-low    { background: rgba(67,217,173,.1);  color: var(--low); }

    .date-cell {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
    }

    /* ── Empty State ───────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
    .empty-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* ── Loading ───────────────────────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 8px;
      color: var(--muted);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ─────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: modalIn .2s ease;
    }

    @keyframes modalIn {
      from { transform: translateY(20px) scale(.97); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    .modal-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 700;
    }

    .modal-close {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px; height: 32px;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }

    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body { padding: 22px 24px; }

    /* ── Forms ─────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13.5px;
      outline: none;
      transition: border-color .2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }

    .form-select option { background: var(--bg3); }

    .form-textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      border: none;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #7b74ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(108,99,255,.35);
    }

    .btn-ghost {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

    .btn-danger {
      background: rgba(255,101,132,.1);
      border: 1px solid rgba(255,101,132,.3);
      color: var(--high);
    }

    .btn-danger:hover {
      background: rgba(255,101,132,.2);
      border-color: var(--high);
    }

    /* ── Ticket Detail ─────────────────────────────────────────────────── */
    .detail-modal { max-width: 700px; }

    .detail-header-info {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .detail-ticket-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .detail-subject {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 18px 0;
    }

    .detail-meta-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .detail-meta-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .detail-meta-value {
      font-size: 13.5px;
      font-weight: 500;
    }

    .detail-description {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    .detail-section-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      margin: 22px 0 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Update Form */
    .update-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Notes */
    .notes-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .note-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .note-author {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    .note-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .note-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── Toast ─────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      min-width: 260px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn .3s ease;
    }

    @keyframes toastIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    .toast.success { border-color: var(--open); }
    .toast.error   { border-color: var(--high); }
    .toast-icon { font-size: 16px; }
    .toast.success .toast-icon { color: var(--open); }
    .toast.error   .toast-icon { color: var(--high); }

    /* ── Dashboard specific ────────────────────────────────────────────── */
    .recent-section { margin-top: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .view-all-link {
      font-size: 12.5px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    .view-all-link:hover { text-decoration: underline; }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .sidebar { width: 200px; min-width: 200px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 680px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; }
      .sidebar-footer { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .page { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🎯</div>
        <div class="logo-text">Support<span>Desk</span></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Navigation</div>
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">▦</span> Dashboard
      </button>
      <button class="nav-item" data-page="tickets">
        <span class="nav-icon">🎫</span> All Tickets
      </button>
      <button class="nav-item" data-page="create">
        <span class="nav-icon">＋</span> New Ticket
      </button>

      <div class="nav-label" style="margin-top:16px">Quick Filters</div>
      <button class="nav-item" data-filter="Open">
        <span class="nav-icon" style="color:var(--open)">●</span> Open
      </button>
      <button class="nav-item" data-filter="In Progress">
        <span class="nav-icon" style="color:var(--inprog)">●</span> In Progress
      </button>
      <button class="nav-item" data-filter="Closed">
        <span class="nav-icon" style="color:var(--muted)">●</span> Closed
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="new-ticket-btn" onclick="showPage('create')">
        ＋ New Ticket
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="global-search"
          placeholder="Search tickets, customers, IDs…"
          autocomplete="off"
        />
      </div>
    </header>

    <!-- Dashboard Page -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-label">Total Tickets</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card s-open">
          <div class="stat-label">Open</div>
          <div class="stat-value" id="stat-open">—</div>
        </div>
        <div class="stat-card s-inprog">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-inprog">—</div>
        </div>
        <div class="stat-card s-closed">
          <div class="stat-label">Closed</div>
          <div class="stat-value" id="stat-closed">—</div>
        </div>
      </div>

      <div class="recent-section">
        <div class="section-header">
          <div class="section-title">Recent Tickets</div>
          <div class="view-all-link" onclick="showPage('tickets')">View all →</div>
        </div>
        <div class="tickets-container">
          <div id="recent-tickets-body"></div>
        </div>
      </div>
    </div>

    <!-- Tickets Page -->
    <div class="page" id="page-tickets">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-chip active" data-status="">All</button>
        <button class="filter-chip open" data-status="Open">Open</button>
        <button class="filter-chip inprog" data-status="In Progress">In Progress</button>
        <button class="filter-chip closed" data-status="Closed">Closed</button>
        <div class="filter-right">
          <select class="select-filter" id="priority-filter">
            <option value="">All Priorities</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
      </div>
      <div class="tickets-container" id="tickets-container">
        <div class="loading"><div class="spinner"></div> Loading tickets…</div>
      </div>
    </div>

    <!-- Create Ticket Page -->
    <div class="page" id="page-create">
      <div style="max-width:600px">
        <div style="margin-bottom:24px">
          <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px">Create New Ticket</h2>
          <p style="color:var(--muted);font-size:13.5px">Fill in the customer and issue details below.</p>
        </div>

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px">
          <div id="create-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Customer Name *</label>
                <input class="form-input" id="cf-name" type="text" placeholder="Jane Smith" />
              </div>
              <div class="form-group">
                <label class="form-label">Customer Email *</label>
                <input class="form-input" id="cf-email" type="email" placeholder="jane@example.com" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Issue Subject *</label>
              <input class="form-input" id="cf-subject" type="text" placeholder="Brief summary of the issue" />
            </div>
            <div class="form-group">
              <label class="form-label">Description *</label>
              <textarea class="form-textarea" id="cf-description" placeholder="Describe the issue in detail…" style="min-height:120px"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Priority</label>
                <select class="form-select" id="cf-priority">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
            <div class="form-actions" style="margin-top:16px;padding-top:16px">
              <button class="btn btn-ghost" onclick="resetCreateForm()">Clear</button>
              <button class="btn btn-primary" onclick="submitCreateTicket()">Create Ticket →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Ticket Detail Modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal detail-modal" id="detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-modal-title">Ticket Details</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detail-modal-body"></div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const API = '/api';

  // ── State ────────────────────────────────────────────────────────────────
  let currentFilter = '';
  let currentSearch = '';
  let currentPriority = '';
  let searchTimer = null;

  // ── API ──────────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  // ── Navigation ───────────────────────────────────────────────────────────
  function showPage(name, filterStatus) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');

    document.querySelectorAll('.nav-item[data-page]').forEach(b => {
      b.classList.toggle('active', b.dataset.page === name);
    });

    const titles = { dashboard: 'Dashboard', tickets: 'All Tickets', create: 'New Ticket' };
    document.getElementById('topbar-title').textContent = titles[name] || name;

    if (name === 'dashboard') loadDashboard();
    if (name === 'tickets') {
      if (filterStatus !== undefined) {
        currentFilter = filterStatus;
        updateFilterChips();
      }
      loadTickets();
    }
  }

  // ── Dashboard ────────────────────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const stats = await api('GET', '/stats');
      document.getElementById('stat-total').textContent  = stats.total;
      document.getElementById('stat-open').textContent   = stats.open;
      document.getElementById('stat-inprog').textContent = stats.in_progress;
      document.getElementById('stat-closed').textContent = stats.closed;

      const body = document.getElementById('recent-tickets-body');
      if (!stats.recent.length) {
        body.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No tickets yet</div>
          <div class="empty-sub">Create your first support ticket to get started</div>
        </div>`;
      } else {
        body.innerHTML = renderTicketsTable(stats.recent);
      }
      attachRowClicks(body);
    } catch (e) {
      toast('Failed to load dashboard', 'error');
    }
  }

  // ── Tickets ──────────────────────────────────────────────────────────────
  async function loadTickets() {
    const container = document.getElementById('tickets-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    try {
      const params = new URLSearchParams();
      if (currentFilter)   params.set('status',   currentFilter);
      if (currentSearch)   params.set('search',   currentSearch);
      if (currentPriority) params.set('priority', currentPriority);
      const tickets = await api('GET', '/tickets?' + params);

      if (!tickets.length) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">No tickets found</div>
          <div class="empty-sub">Try adjusting your filters or search query</div>
        </div>`;
        return;
      }
      container.innerHTML = renderTicketsTable(tickets);
      attachRowClicks(container);
    } catch (e) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Failed to load</div>
        <div class="empty-sub">${e.message}</div>
      </div>`;
    }
  }

  function renderTicketsTable(tickets) {
    return `
    <table class="tickets-table">
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Subject</th>
          <th>Customer</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody>
        ${tickets.map(t => `
        <tr data-id="${t.ticket_id}">
          <td><span class="ticket-id">${t.ticket_id}</span></td>
          <td>
            <div class="ticket-subject">
              ${escHtml(t.subject)}
              <div class="sub">${escHtml(t.description?.slice(0, 60) || '')}${(t.description?.length > 60) ? '…' : ''}</div>
            </div>
          </td>
          <td>
            <div class="customer-info">
              <div class="name">${escHtml(t.customer_name)}</div>
              <div class="email">${escHtml(t.customer_email)}</div>
            </div>
          </td>
          <td>${priorityBadge(t.priority)}</td>
          <td>${statusBadge(t.status)}</td>
          <td><span class="date-cell">${formatDate(t.created_at)}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  function attachRowClicks(container) {
    container.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', () => openDetail(row.dataset.id));
    });
  }

  // ── Filters ──────────────────────────────────────────────────────────────
  function updateFilterChips() {
    document.querySelectorAll('#filter-bar .filter-chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.status === currentFilter);
    });
  }

  document.querySelectorAll('#filter-bar .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      currentFilter = chip.dataset.status;
      updateFilterChips();
      loadTickets();
    });
  });

  document.getElementById('priority-filter').addEventListener('change', e => {
    currentPriority = e.target.value;
    loadTickets();
  });

  document.querySelectorAll('.nav-item[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      showPage('tickets', btn.dataset.filter);
    });
  });

  // ── Search ───────────────────────────────────────────────────────────────
  document.getElementById('global-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    currentSearch = e.target.value.trim();
    searchTimer = setTimeout(() => {
      const active = document.querySelector('.page.active');
      if (active.id === 'page-tickets') loadTickets();
      else if (currentSearch) showPage('tickets');
    }, 300);
  });

  // ── Detail Modal ──────────────────────────────────────────────────────────
  async function openDetail(ticketId) {
    const overlay = document.getElementById('detail-overlay');
    const body    = document.getElementById('detail-modal-body');
    const title   = document.getElementById('detail-modal-title');
    overlay.classList.add('open');
    title.textContent = ticketId;
    body.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';

    try {
      const t = await api('GET', '/tickets/' + ticketId);
      title.textContent = ticketId;
      body.innerHTML = `
        <div class="detail-header-info">
          <div>
            <div class="detail-ticket-id">${t.ticket_id}</div>
            <div class="detail-subject">${escHtml(t.subject)}</div>
          </div>
          <div>${statusBadge(t.status)}</div>
        </div>

        <div class="detail-meta">
          <div class="detail-meta-item">
            <div class="detail-meta-label">Customer</div>
            <div class="detail-meta-value">${escHtml(t.customer_name)}</div>
          </div>
          <div class="detail-meta-item">
            <div class="detail-meta-label">Email</div>
            <div class="detail-meta-value">${escHtml(t.customer_email)}</div>
          </div>
          <div class="detail-meta-item">
            <div class="detail-meta-label">Priority</div>
            <div class="detail-meta-value">${priorityBadge(t.priority)}</div>
          </div>
          <div class="detail-meta-item">
            <div class="detail-meta-label">Created</div>
            <div class="detail-meta-value" style="font-family:var(--font-mono);font-size:12px">${formatDateFull(t.created_at)}</div>
          </div>
        </div>

        <div class="detail-section-title">Description</div>
        <div class="detail-description">${escHtml(t.description)}</div>

        <div class="detail-section-title">Update Ticket</div>
        <div class="update-row">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="upd-status">
              <option ${t.status==='Open'?'selected':''}>Open</option>
              <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
              <option ${t.status==='Closed'?'selected':''}>Closed</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-select" id="upd-priority">
              <option ${t.priority==='Low'?'selected':''}>Low</option>
              <option ${t.priority==='Medium'?'selected':''}>Medium</option>
              <option ${t.priority==='High'?'selected':''}>High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Add Note / Comment</label>
          <textarea class="form-textarea" id="upd-note" placeholder="Add a note or update…" style="min-height:72px"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:space-between">
          <button class="btn btn-danger" onclick="deleteTicket('${t.ticket_id}')">Delete</button>
          <button class="btn btn-primary" onclick="submitUpdate('${t.ticket_id}')">Save Changes →</button>
        </div>

        ${t.notes && t.notes.length ? `
        <div class="detail-section-title">Notes & Activity</div>
        <div class="notes-list">
          ${t.notes.map(n => `
          <div class="note-item">
            <div class="note-header">
              <span class="note-author">${escHtml(n.author)}</span>
              <span class="note-date">${formatDateFull(n.created_at)}</span>
            </div>
            <div class="note-text">${escHtml(n.note_text)}</div>
          </div>`).join('')}
        </div>` : ''}
      `;
    } catch (e) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
    }
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDetail();
  });

  async function submitUpdate(ticketId) {
    const status    = document.getElementById('upd-status')?.value;
    const priority  = document.getElementById('upd-priority')?.value;
    const note_text = document.getElementById('upd-note')?.value || '';
    try {
      await api('PUT', '/tickets/' + ticketId, { status, priority, note_text });
      toast('Ticket updated successfully', 'success');
      closeDetail();
      refreshCurrentPage();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function deleteTicket(ticketId) {
    if (!confirm(`Delete ticket ${ticketId}? This cannot be undone.`)) return;
    try {
      await api('DELETE', '/tickets/' + ticketId);
      toast('Ticket deleted', 'success');
      closeDetail();
      refreshCurrentPage();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Create Ticket ─────────────────────────────────────────────────────────
  async function submitCreateTicket() {
    const name        = document.getElementById('cf-name').value.trim();
    const email       = document.getElementById('cf-email').value.trim();
    const subject     = document.getElementById('cf-subject').value.trim();
    const description = document.getElementById('cf-description').value.trim();
    const priority    = document.getElementById('cf-priority').value;

    if (!name || !email || !subject || !description) {
      toast('Please fill in all required fields', 'error'); return;
    }
    const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRx.test(email)) {
      toast('Please enter a valid email address', 'error'); return;
    }

    try {
      const result = await api('POST', '/tickets', { customer_name: name, customer_email: email, subject, description, priority });
      toast(`Ticket ${result.ticket_id} created!`, 'success');
      resetCreateForm();
      showPage('tickets');
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function resetCreateForm() {
    ['cf-name','cf-email','cf-subject','cf-description'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('cf-priority').value = 'Medium';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function refreshCurrentPage() {
    const active = document.querySelector('.page.active');
    if (active.id === 'page-dashboard') loadDashboard();
    else if (active.id === 'page-tickets') loadTickets();
  }

  function statusBadge(status) {
    const map = { 'Open': 'open', 'In Progress': 'inprog', 'Closed': 'closed' };
    return `<span class="badge badge-${map[status] || 'closed'}">${status}</span>`;
  }

  function priorityBadge(priority) {
    const map = { 'High': 'high', 'Medium': 'med', 'Low': 'low' };
    return `<span class="badge badge-${map[priority] || 'med'}">${priority || 'Medium'}</span>`;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatDateFull(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : '⚠'}</span>${escHtml(msg)}`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ── Page Nav ──────────────────────────────────────────────────────────────
  document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  loadDashboard();
</script>
</body>
</html>
